spring:
  application:
    name: unified-document-viewer
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/document_viewer}
    username: ${DATABASE_USERNAME:document_viewer}
    password: ${DATABASE_PASSWORD:document_viewer}
  flyway:
    enabled: true
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

document-viewer:
  downstream:
    sales:
      base-url: ${SALES_SYSTEM_BASE_URL:http://localhost:8081}
      timeout: 2s
    service:
      base-url: ${SERVICE_SYSTEM_BASE_URL:http://localhost:8082}
      timeout: 2s
  audit:
    hmac-key: ${AUDIT_HMAC_KEY:local-development-only-change-me}

