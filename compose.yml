services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: document_viewer
      POSTGRES_USER: document_viewer
      POSTGRES_PASSWORD: document_viewer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_viewer -d document_viewer"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - document-viewer-postgres:/var/lib/postgresql

volumes:
  document-viewer-postgres:
